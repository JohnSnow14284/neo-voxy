name: Build Minecraft Mod (NeoForge)

on:
  workflow_dispatch:
  push:
    branches: [1211, 2612, Merge1.21.1neo]
  pull_request:
    branches: [1211, 2612, Merge1.21.1neo]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: false

      - name: Grant execute permission for Gradle wrapper
        run: chmod +x ./gradlew

      - name: Build mod with Gradle
        run: ./gradlew -I init.gradle clean build --no-daemon

      - name: Select release JAR
        shell: bash
        run: |
          set -euo pipefail
          rm -rf build/release
          mkdir -p build/release

          if [[ -f build/libs/neo-voxy.jar ]]; then
            release_jar="build/libs/neo-voxy.jar"
          else
            mapfile -t slim_jars < <(
              find build/libs -maxdepth 1 -type f \
                -name 'neo-voxy-*-slim.jar' -print | sort
            )

            if (( ${#slim_jars[@]} == 1 )); then
              release_jar="${slim_jars[0]}"
            elif (( ${#slim_jars[@]} > 1 )); then
              echo "Expected one slim release JAR, found ${#slim_jars[@]}:" >&2
              printf '  %s\n' "${slim_jars[@]}" >&2
              exit 1
            else
              mapfile -t release_jars < <(
                find build/libs -maxdepth 1 -type f \
                  \( -name 'neo-voxy.jar' -o -name 'neo-voxy-*.jar' \) \
                  ! -name '*-unoptimized.jar' \
                  ! -name '*-sources.jar' \
                  ! -name '*-dev.jar' \
                  ! -name '*-slim.jar' \
                  -print | sort
              )

              if (( ${#release_jars[@]} != 1 )); then
                echo "Expected one release JAR, found ${#release_jars[@]}:" >&2
                find build/libs -maxdepth 1 -type f -name '*.jar' -print >&2
                exit 1
              fi

              release_jar="${release_jars[0]}"
            fi
          fi

          release_size=$(stat -c '%s' "$release_jar")
          echo "Selected release: $release_jar ($release_size bytes)"

          if (( release_size > 33554432 )); then
            echo "Release exceeds the 32 MiB safety limit." >&2
            exit 1
          fi

          cp "$release_jar" build/release/neo-voxy.jar
          sha256sum build/release/neo-voxy.jar

      - name: List generated JARs
        shell: bash
        run: |
          echo "=== Generated JARs ==="
          find build -maxdepth 3 -type f -name '*.jar' -print
          echo "=== Artifact selected for upload ==="
          ls -lah build/release/

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: neo-voxy
          path: build/release/neo-voxy.jar
          if-no-files-found: error
          compression-level: 0
