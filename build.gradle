import java.nio.file.Files
import java.nio.file.StandardCopyOption
import java.util.zip.CRC32
import java.util.zip.ZipEntry
import java.util.zip.ZipFile
import java.util.zip.ZipInputStream
import java.util.zip.ZipOutputStream

plugins {
    id 'net.neoforged.moddev' version "2.0.42-beta"
    id 'maven-publish'
}

version = project.mod_version
group = project.maven_group

base {
    archivesName = project.archives_base_name
}

repositories {
    exclusiveContent {
        forRepository {
            maven {
                name = "Modrinth"
                url = "https://api.modrinth.com/maven"
            }
        }
        filter {
            includeGroup "maven.modrinth"
        }
    }

    exclusiveContent {
        forRepository {
            maven {
                name = "caffeinemcRepository"
                url = "https://maven.caffeinemc.net/snapshots"
            }
        }
        filter {
            includeGroup "net.caffeinemc"
        }
    }

    maven {
        name = "CurseMaven"
        url = "https://cursemaven.com"
    }
}


def gitCommitHash = { ->
    try {
        ExecOutput result = providers.exec {
            commandLine = ['git', 'rev-parse', '--short', 'HEAD']
            ignoreExitValue = true
        }

        if (result.getResult().get().getExitValue() != 0) {
            return "<UnknownCommit>";
        } else {
            return result.standardOutput.asText.get().strip();
        }
    } catch (Exception e) {
        e.printStackTrace()
        return "<UnknownCommit>";
    }
}

def buildtime = { (System.currentTimeMillis() / 1000L) }

processResources {
    def time = buildtime()
    def hash = gitCommitHash()
    def version = project.version

    inputs.properties("version": version, "commit": hash, "buildtime": time)
    filesMatching("META-INF/neoforge.mods.toml") {
        expand "version": version, "commit": hash, "buildtime": time
    }

    // Exclude leftover Fabric metadata from NeoForge build
    exclude 'fabric.mod.json'
    exclude 'voxy.accesswidener'
}

neoForge {
    version = project.neoforge_version

    // Validate access transformers at build time to catch invalid targets
    // Temporarily disabled to debug build issue
    // validateAccessTransformers = true

    accessTransformers {
        file('src/main/resources/META-INF/accesstransformer.cfg')
    }

    parchment {
        minecraftVersion = project.minecraft_version
        mappingsVersion = "2024.11.17"
    }
}

configurations {
    sodiumDistribution
}

def sodiumVersion = "mc1.21.1-0.8.12-alpha.4-neoforge"
def sodiumNestedJar = "META-INF/jarjar/net.caffeinemc.sodium-neoforge-0.8.12-alpha.4+mc1.21.1-mod.jar"
def sodiumCompileJar = layout.buildDirectory.file("generated/compile-deps/sodium-neoforge-0.8.12-alpha.4-mod.jar")

tasks.register("extractSodiumCompileJar", Copy) {
    from({
        zipTree(configurations.sodiumDistribution.singleFile).matching {
            include sodiumNestedJar
        }
    })
    into(sodiumCompileJar.map { it.asFile.parentFile })
    eachFile {
        path = name
    }
    includeEmptyDirs = false
    rename { "sodium-neoforge-0.8.12-alpha.4-mod.jar" }
}

dependencies {
    // To change the versions see the gradle.properties file
    implementation "net.neoforged:neoforge:${project.neoforge_version}"


    // Sodium for NeoForge (matches the 0.8 alpha used by the target modpack)
    sodiumDistribution "maven.modrinth:sodium:${sodiumVersion}"
    implementation "maven.modrinth:sodium:${sodiumVersion}"
    compileOnly files(sodiumCompileJar).builtBy(tasks.named("extractSodiumCompileJar"))

    // Lithium for NeoForge (0.15.1 - latest for MC 1.21.1)
    implementation("maven.modrinth:lithium:mc1.21.1-0.15.1-neoforge")

    compileOnly("curse.maven:irisshaders-455508:6661598")

}


def targetJavaVersion = 21
tasks.withType(JavaCompile).configureEach {
    it.options.encoding = "UTF-8"
    it.options.release = targetJavaVersion
    it.options.deprecation = true
}

java {
    def javaVersion = JavaVersion.toVersion(targetJavaVersion)
    if (JavaVersion.current() < javaVersion) {
        toolchain.languageVersion = JavaLanguageVersion.of(targetJavaVersion)
    }
}

def licenseArchiveSuffix = project.archives_base_name.toString()
jar {
    // Keep the full dependency bundle as an intermediate artifact. The optimized
    // distribution produced below uses the normal release filename.
    archiveClassifier.set('unoptimized')
    destinationDirectory.set(layout.buildDirectory.dir('intermediates/jars'))

    from("LICENSE.md") {
        rename { "${it}_${licenseArchiveSuffix}"}
    }
}

// Produce the compact distribution JAR entirely inside Gradle.
// The task is self-contained, configuration-cache friendly, and does not require tools/ or Python.
abstract class SlimJarTask extends DefaultTask {
    private static final String MODULE_INFO = 'META-INF/versions/9/module-info.class'
    private static final Set<String> ROCKS_NATIVES_TO_KEEP = [
            'librocksdbjni-win64.dll'
    ] as Set
    private static final Set<String> SQLITE_NATIVES_TO_KEEP = [
            'org/sqlite/native/windows/x86_64/sqlitejdbc.dll',
            'org/sqlite/native/linux/x86_64/libsqlitejdbc.so'
    ] as Set

    @InputFile
    @PathSensitive(PathSensitivity.NONE)
    abstract RegularFileProperty getSourceJar()

    @OutputFile
    abstract RegularFileProperty getTargetJar()

    @TaskAction
    void createSlimJar() {
        File source = sourceJar.get().asFile
        File target = targetJar.get().asFile
        File temporary = new File(target.parentFile, target.name + '.tmp')

        target.parentFile.mkdirs()
        Files.deleteIfExists(target.toPath())
        Files.deleteIfExists(temporary.toPath())

        int[] counters = new int[3]
        ZipFile inputJar = new ZipFile(source)
        ZipOutputStream outputJar = new ZipOutputStream(
                new BufferedOutputStream(new FileOutputStream(temporary)))

        try {
            def entries = inputJar.entries()
            while (entries.hasMoreElements()) {
                ZipEntry sourceEntry = entries.nextElement()
                byte[] data
                inputJar.getInputStream(sourceEntry).withCloseable { stream ->
                    data = stream.readAllBytes()
                }

                String path = sourceEntry.name.toLowerCase(Locale.ROOT)
                boolean forceStored = false

                if (path.startsWith('meta-inf/jarjar/rocksdbjni-') && path.endsWith('.jar')) {
                    data = rewriteNestedJar(data, 'rocksdb', counters)
                    forceStored = true
                    counters[2]++
                } else if (path.startsWith('meta-inf/jarjar/sqlite-jdbc-') && path.endsWith('.jar')) {
                    data = rewriteNestedJar(data, 'sqlite', counters)
                    forceStored = true
                    counters[2]++
                } else if ((path.startsWith('meta-inf/jarjar/lwjgl-lmdb-') ||
                        path.startsWith('meta-inf/jarjar/lwjgl-zstd-')) && path.endsWith('.jar')) {
                    data = rewriteNestedJar(data, 'module', counters)
                    forceStored = true
                    counters[2]++
                }

                ZipEntry targetEntry = new ZipEntry(sourceEntry.name)
                configureEntry(sourceEntry, targetEntry, data, forceStored)
                outputJar.putNextEntry(targetEntry)
                if (!sourceEntry.directory && data.length > 0) {
                    outputJar.write(data)
                }
                outputJar.closeEntry()
            }
        } finally {
            outputJar.close()
            inputJar.close()
        }

        Files.move(temporary.toPath(), target.toPath(), StandardCopyOption.REPLACE_EXISTING)

        double beforeMiB = source.length() / (1024.0d * 1024.0d)
        double afterMiB = target.length() / (1024.0d * 1024.0d)
        logger.lifecycle(String.format(Locale.ROOT,
                'Slim JAR: %.1f MiB -> %.1f MiB (%d nested jars, %d unused natives removed, %d module descriptors removed)',
                beforeMiB, afterMiB, counters[2], counters[0], counters[1]))
        logger.lifecycle("Slim JAR written to: ${target}")
    }

    private static byte[] rewriteNestedJar(byte[] sourceBytes, String mode, int[] counters) {
        ByteArrayOutputStream result = new ByteArrayOutputStream(sourceBytes.length)
        ZipInputStream input = new ZipInputStream(new ByteArrayInputStream(sourceBytes))
        ZipOutputStream output = new ZipOutputStream(result)

        try {
            ZipEntry sourceEntry
            while ((sourceEntry = input.nextEntry) != null) {
                byte[] data = input.readAllBytes()
                String fileName = sourceEntry.name.substring(sourceEntry.name.lastIndexOf('/') + 1)
                String normalizedPath = sourceEntry.name.replace('\\', '/').toLowerCase(Locale.ROOT)

                boolean drop
                if (mode == 'rocksdb') {
                    boolean nativeLibrary = fileName.startsWith('librocksdbjni-') &&
                            (fileName.endsWith('.so') || fileName.endsWith('.dll') ||
                                    fileName.endsWith('.jnilib') || fileName.endsWith('.dylib'))
                    drop = nativeLibrary && !ROCKS_NATIVES_TO_KEEP.contains(fileName)
                    if (drop) {
                        counters[0]++
                    }
                } else if (mode == 'sqlite') {
                    boolean nativeLibrary = normalizedPath.startsWith('org/sqlite/native/') &&
                            !sourceEntry.directory
                    drop = nativeLibrary && !SQLITE_NATIVES_TO_KEEP.contains(normalizedPath)
                    if (drop) counters[0]++
                } else {
                    drop = sourceEntry.name == MODULE_INFO
                    if (drop) {
                        counters[1]++
                    }
                }

                if (!drop) {
                    ZipEntry targetEntry = new ZipEntry(sourceEntry.name)
                    configureEntry(sourceEntry, targetEntry, data, false)
                    output.putNextEntry(targetEntry)
                    if (!sourceEntry.directory && data.length > 0) {
                        output.write(data)
                    }
                    output.closeEntry()
                }
                input.closeEntry()
            }
        } finally {
            output.close()
            input.close()
        }

        result.toByteArray()
    }


    private static void configureEntry(ZipEntry source, ZipEntry target, byte[] data, boolean forceStored) {
        if (source.time >= 0) {
            target.time = source.time
        }
        if (source.comment != null) {
            target.comment = source.comment
        }

        int method = forceStored ? ZipEntry.STORED : source.method
        if (method == ZipEntry.STORED) {
            CRC32 crc = new CRC32()
            crc.update(data)
            target.method = ZipEntry.STORED
            target.size = data.length
            target.compressedSize = data.length
            target.crc = crc.value
        } else {
            target.method = ZipEntry.DEFLATED
        }
    }
}

def productionJar = tasks.named('jar', Jar)
def slimJarTask = tasks.register('slimJar', SlimJarTask) {
    description = 'Creates a compact production JAR with only supported Windows/Linux x64 natives'
    group = 'build'
    dependsOn productionJar
    sourceJar.set(productionJar.flatMap { it.archiveFile })
    targetJar.set(layout.buildDirectory.file(
            "libs/${project.archives_base_name}-${project.version}.jar"))
}

// A normal `gradlew build` produces the optimized release JAR and keeps the
// unoptimized bundle available only as a diagnostic artifact.
tasks.named('build') {
    dependsOn slimJarTask
}

project.ext.lwjglVersion = "3.3.3"
project.ext.lwjglNatives = "natives-windows"

repositories {
    mavenCentral()
}

// Configuration to download LWJGL natives for repackaging
configurations {
    lwjglNativesRaw
}

dependencies {
    // Download natives for repackaging (module-info.class will be stripped)
    lwjglNativesRaw "org.lwjgl:lwjgl-lmdb:$lwjglVersion:natives-windows"
    lwjglNativesRaw "org.lwjgl:lwjgl-zstd:$lwjglVersion:natives-windows"
    lwjglNativesRaw "org.lwjgl:lwjgl-lmdb:$lwjglVersion:natives-linux"
    lwjglNativesRaw "org.lwjgl:lwjgl-zstd:$lwjglVersion:natives-linux"
}

// Task to extract LWJGL native binaries (DLLs/SOs) from native JARs
// LWJGL can load natives from the classpath root - no module-info.class issues
def extractedNativesDir = layout.buildDirectory.dir("extracted-natives")

tasks.register('extractLwjglNatives') {
    description = 'Extracts native binaries from LWJGL native JARs for bundling'
    group = 'build'

    inputs.files(configurations.lwjglNativesRaw)
    outputs.dir(extractedNativesDir)

    doLast {
        def outputDir = extractedNativesDir.get().asFile
        outputDir.mkdirs()

        configurations.lwjglNativesRaw.resolvedConfiguration.resolvedArtifacts.each { artifact ->
            def inputJar = artifact.file
            logger.lifecycle("Extracting natives from ${inputJar.name}")

            // Extract only native binaries (.dll, .so, .dylib)
            copy {
                from(zipTree(inputJar)) {
                    include '**/*.dll'
                    include '**/*.so'
                    include '**/*.dylib'
                    // Flatten directory structure - put all natives at root
                    eachFile { fcp ->
                        fcp.relativePath = new RelativePath(true, fcp.name)
                    }
                    includeEmptyDirs = false
                }
                into outputDir
            }
        }

        // List extracted files
        outputDir.listFiles()?.each { file ->
            logger.lifecycle("  Extracted: ${file.name}")
        }
    }
}

// Include extracted natives in the mod JAR root
// LWJGL will find them there when the mod JAR is on the classpath
tasks.named('jar') {
    dependsOn 'extractLwjglNatives'

    from(extractedNativesDir) {
        // Natives at JAR root for LWJGL to find
        into ''
    }
}

dependencies {
    implementation platform("org.lwjgl:lwjgl-bom:$lwjglVersion")

    // LWJGL core - provided by Minecraft
    implementation "org.lwjgl:lwjgl"

    // LWJGL-LMDB and LWJGL-ZSTD - Required by Voxy, NOT provided by Minecraft
    // Reference: https://docs.neoforged.net/toolchain/docs/dependencies/nonmclibs/
    //
    // The natives JARs originally have module-info.class with "requires org.lwjgl.zstd"
    // which causes JPMS conflict. We repackage them without module-info.class above.
    jarJar(implementation("org.lwjgl:lwjgl-lmdb:$lwjglVersion")) {
        version { strictly "[3.3.0,4.0.0)"; prefer "$lwjglVersion" }
    }
    jarJar(implementation("org.lwjgl:lwjgl-zstd:$lwjglVersion")) {
        version { strictly "[3.3.0,4.0.0)"; prefer "$lwjglVersion" }
    }
    // Add to runtime classpath for MC 1.21.1 (not needed for 1.21.9+)
    additionalRuntimeClasspath "org.lwjgl:lwjgl-lmdb:$lwjglVersion"
    additionalRuntimeClasspath "org.lwjgl:lwjgl-zstd:$lwjglVersion"
    // Natives also need to be on runtime classpath (LWJGL extracts from classpath)
    additionalRuntimeClasspath "org.lwjgl:lwjgl-lmdb:$lwjglVersion:natives-windows"
    additionalRuntimeClasspath "org.lwjgl:lwjgl-zstd:$lwjglVersion:natives-windows"
    additionalRuntimeClasspath "org.lwjgl:lwjgl-lmdb:$lwjglVersion:natives-linux"
    additionalRuntimeClasspath "org.lwjgl:lwjgl-zstd:$lwjglVersion:natives-linux"

    // Keep the Windows x64 RocksDB compatibility backend for existing caches. New
    // installations use the smaller cross-platform LMDB backend by default.
    jarJar(implementation('org.rocksdb:rocksdbjni:10.2.1')) {
        version { strictly '[10.0.0, 11.0.0)'; prefer '10.2.1' }
    }

    // LZ4 - PROVIDED by Minecraft runtime (do NOT bundle - causes module conflict)
    implementation 'org.lz4:lz4-java:1.8.0'

    // Redis remains available without pulling unrelated optional storage engines.
    jarJar(implementation('redis.clients:jedis:5.1.0')) {
        version { strictly '[5.0.0, 6.0.0)'; prefer '5.1.0' }
    }
    jarJar(implementation('org.apache.commons:commons-pool2:2.12.0')) {
        version { strictly '[2.12.0, 3.0.0)'; prefer '2.12.0' }
    }
    additionalRuntimeClasspath 'redis.clients:jedis:5.1.0'
    additionalRuntimeClasspath 'org.apache.commons:commons-pool2:2.12.0'

    // Distant Horizons import support
    jarJar(implementation('org.tukaani:xz:1.10')) {
        version {
            strictly '[1.9, 2.0)'
            prefer '1.10'
        }
    }
    // The release task retains only Windows/Linux x64 SQLite natives.
    jarJar(implementation('org.xerial:sqlite-jdbc:3.49.1.0')) {
        version { strictly '[3.40.0.0, 4.0.0.0)'; prefer '3.49.1.0' }
    }
    additionalRuntimeClasspath 'org.xerial:sqlite-jdbc:3.49.1.0'
}
